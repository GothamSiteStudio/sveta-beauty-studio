<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="../public/fonts/fonts.css" />
  <link rel="stylesheet" href="print.css" />
  <style>
    /* Clinic entrance sign — A3 portrait 297×420mm + 3mm bleed = 303×426mm.
       Vector text + high-res logo -> can be enlarged to A2/A1 and stay crisp. */
    @page { size: 303mm 426mm; margin: 0; }
    html, body { width: 303mm; height: 426mm; }
    :root { --fr-out: 9mm; --fr-in: 12mm; }
    .frame.outer { border-width: 1.2pt; }

    .sign { position: absolute; inset: 22mm 24mm; display: flex; flex-direction: column;
            align-items: center; text-align: center; }
    .sign .logo { width: 150mm; height: auto; margin-top: 4mm;
      filter: drop-shadow(0 1mm 2.4mm rgba(120,90,50,0.20)); }
    .sign .tag { font-family: var(--serif); font-size: 21pt; color: var(--muted);
      margin-top: 2mm; letter-spacing: 0.02em; }

    .divider { width: 120mm; margin: 12mm 0; }
    .divider .dot { width: 8px; height: 8px; }

    .services { font-family: var(--serif); color: var(--text); line-height: 1.9; }
    .services .row { font-size: 19pt; }
    .services .lead { font-size: 21pt; color: var(--bronze); font-weight: 700; margin-bottom: 1mm; }
    .services .sep { color: var(--gold); margin: 0 0.5em; font-size: 0.8em; vertical-align: 0.1em; }

    .foot { margin-top: auto; display: flex; flex-direction: column; align-items: center; gap: 7mm; width: 100%; }
    .foot .cta { font-family: var(--serif); font-size: 17pt; color: var(--text); }
    .foot .contacts { display: flex; align-items: center; justify-content: center; gap: 14mm; flex-wrap: wrap; }
    .contact-row { font-size: 15pt; }
    .contact-row .ic { width: 6mm; height: 6mm; }
    .qrbox { display: flex; flex-direction: column; align-items: center; gap: 2mm; }
    .qrbox .qr { width: 34mm; height: 34mm; }
    .qrbox .lbl { font-size: 11pt; color: var(--muted); letter-spacing: 0.05em; }
    .ph { color: var(--gold-deep); font-weight: 700; }
    .location { font-family: var(--serif); font-size: 16pt; color: var(--bronze); letter-spacing: 0.28em; margin-top: 1mm; }
  </style>
</head>
<body>
  <div class="sheet">
    <div class="frame outer"></div>
    <div class="frame inner"></div>
    <div class="sign">
      <img class="logo" src="assets/logo-print.png" alt="Sveta Beauty Studio" />
      <div class="tag">מבט טבעי שנשאר איתך</div>

      <div class="divider"><span class="dot"></span></div>

      <div class="services">
        <div class="lead">הטיפולים שלנו</div>
        <div class="row">איפור קבוע ומיקרופיגמנטציה במכשור מתקדם</div>
        <div class="row">עיצוב גבות טבעיות<span class="sep">✦</span>הרמת גבות</div>
        <div class="row">צביעת גבות<span class="sep">✦</span>הדבקת והרמת ריסים</div>
      </div>

      <div class="foot">
        <div class="divider" style="width:90mm;margin:2mm 0 4mm"><span class="dot"></span></div>
        <div class="cta">לתיאום תור מראש</div>
        <div class="contacts">
          <div class="qrbox">
            <img class="qr" src="assets/qr.png" alt="QR לאתר" />
            <div class="lbl">סרקו לאתר ולתיאום</div>
          </div>
          <div style="display:flex;flex-direction:column;gap:4mm;text-align:right">
            <div class="contact-row">
              <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M6.5 3.5h3l1.5 4-2 1.5a12 12 0 0 0 6 6l1.5-2 4 1.5v3a2 2 0 0 1-2.2 2A16.5 16.5 0 0 1 4.5 5.7 2 2 0 0 1 6.5 3.5z"/></svg>
              <span class="ph" dir="ltr">050&#8209;000&#8209;0000</span>
            </div>
            <div class="contact-row">
              <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3.5" y="3.5" width="17" height="17" rx="5"/><circle cx="12" cy="12" r="3.6"/><circle cx="17.2" cy="6.8" r="1" fill="currentColor" stroke="none"/></svg>
              <span class="ph" dir="ltr">@sveta.beauty.studio</span>
            </div>
          </div>
        </div>
        <div class="location">חדרה</div>
      </div>
    </div>
  </div>
</body>
</html>
