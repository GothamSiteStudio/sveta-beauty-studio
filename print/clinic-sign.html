<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="../public/fonts/fonts.css" />
  <link rel="stylesheet" href="print.css" />
  <style>
    /* Clinic entrance sign — A3 portrait 297×420mm + 3mm bleed = 303×426mm.
       Just the logo (SP + SVETA BEAUTY STUDIO + SVETA PASHEV), centered. */
    @page { size: 303mm 426mm; margin: 0; }
    html, body { width: 303mm; height: 426mm; }
    :root { --fr-out: 9mm; --fr-in: 12mm; }
    .frame.outer { border-width: 1.2pt; }
    .sign { position: absolute; inset: 0; display: flex;
            align-items: center; justify-content: center; }
    .sign .logo { width: 178mm; height: auto;
      filter: drop-shadow(0 1mm 2.4mm rgba(120,90,50,0.18)); }
  </style>
</head>
<body>
  <div class="sheet">
    <div class="frame outer"></div>
    <div class="frame inner"></div>
    <div class="sign">
      <img class="logo" src="assets/logo-print.png" alt="Sveta Beauty Studio · Sveta Pashev" />
    </div>
  </div>
</body>
</html>
