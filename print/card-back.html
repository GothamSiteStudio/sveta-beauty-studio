<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="../public/fonts/fonts.css" />
  <link rel="stylesheet" href="print.css" />
  <style>
    @page { size: 96mm 56mm; margin: 0; }
    html, body { width: 96mm; height: 56mm; }
    :root { --fr-out: 5mm; --fr-in: 6.4mm; }
    .back { position: absolute; inset: 7mm 9mm; display: flex; flex-direction: column;
            align-items: center; text-align: center; }
    .back .mark { height: 13mm; width: auto; margin-bottom: 1.4mm;
      filter: drop-shadow(0 0.5mm 1.1mm rgba(120,90,50,0.22)); }
    .back .brand { font-family: var(--latin); letter-spacing: 0.16em; font-size: 8pt;
      color: var(--bronze); font-weight: 600; white-space: nowrap; }
    .back .divider { width: 38mm; margin: 1.7mm 0; }
    .services { font-family: var(--serif); font-size: 8.2pt; color: var(--text); line-height: 1.5; }
    .services .sep { color: var(--gold); margin: 0 0.35em; }
    .contact { display: flex; flex-direction: column; align-items: center; gap: 1.5mm;
      margin-top: auto; }
    .contact-row { font-size: 8.2pt; }
    .contact-row .ic { width: 3.6mm; height: 3.6mm; }
    .ph { color: var(--gold-deep); font-weight: 700; } /* placeholder marker */
  </style>
</head>
<body>
  <div class="sheet">
    <div class="frame outer"></div>
    <div class="frame inner"></div>
    <div class="back">
      <img class="mark" src="assets/mark-print.png" alt="SP" />
      <div class="brand">SVETA&nbsp;BEAUTY&nbsp;STUDIO</div>
      <div class="divider"><span class="dot"></span></div>
      <div class="services">
        איפור קבוע<span class="sep">·</span>עיצוב גבות<span class="sep">·</span>הרמת גבות<span class="sep">·</span>ריסים
      </div>
      <div class="contact">
        <div class="contact-row">
          <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M6.5 3.5h3l1.5 4-2 1.5a12 12 0 0 0 6 6l1.5-2 4 1.5v3a2 2 0 0 1-2.2 2A16.5 16.5 0 0 1 4.5 5.7 2 2 0 0 1 6.5 3.5z"/></svg>
          <span class="ph" dir="ltr">050&#8209;000&#8209;0000</span>
        </div>
        <div class="contact-row">
          <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3.5" y="3.5" width="17" height="17" rx="5"/><circle cx="12" cy="12" r="3.6"/><circle cx="17.2" cy="6.8" r="1" fill="currentColor" stroke="none"/></svg>
          <span class="ph" dir="ltr">@sveta.beauty.studio</span>
        </div>
        <div class="contact-row">
          <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s6.5-5.4 6.5-10.2A6.5 6.5 0 0 0 5.5 10.8C5.5 15.6 12 21 12 21z"/><circle cx="12" cy="10.6" r="2.4"/></svg>
          <span>חדרה</span>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
